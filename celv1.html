<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>CC Sama Bolso v1 — localStorage</title>
<style>
:root{--bg:#eef2f8;--card:#fff;--txt:#172033;--muted:#637083;--line:#d9e1ef;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--purple:#7c3aed;--yellow:#f59e0b;--hourW:64px;--rowH:54px;--labelW:88px}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt)}
header{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.97);border-bottom:1px solid var(--line);padding:10px 10px 8px;box-shadow:0 4px 16px #0f172a14}.top{display:flex;gap:8px;align-items:center}.title{font-weight:900;font-size:16px;line-height:1.05;flex:1}.date{width:128px}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}.tab{border:1px solid var(--line);background:#f8fafc;color:#334155;border-radius:999px;padding:9px 5px;font-weight:900;font-size:12px}.tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
main{padding:10px}.panel{display:none}.panel.active{display:block}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px;margin-bottom:10px;box-shadow:0 6px 18px #0f172a0d}.small{font-size:12px;color:var(--muted);line-height:1.35}.status{white-space:pre-wrap;font-size:12px;background:#eff6ff;border:1px solid #bfdbfe;color:#1e3a8a;border-radius:12px;padding:9px;margin-top:8px;font-weight:700}label{display:block;font-weight:900;font-size:12px;margin:7px 0 5px}input,textarea,select,button{font:inherit}input,textarea,select{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff;color:var(--txt)}textarea{min-height:150px;resize:vertical;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px}button{border:0;border-radius:12px;padding:10px 12px;background:var(--blue);color:#fff;font-weight:900}button.green{background:var(--green)}button.red{background:var(--red)}button.gray{background:#64748b}button.purple{background:var(--purple)}button.light{background:#f8fafc;color:#0f172a;border:1px solid var(--line)}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.row>button{flex:1}.kpis{display:flex;gap:6px;overflow:auto;padding:2px 0}.kpi{white-space:nowrap;background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 10px;font-weight:900;font-size:12px}.list{display:grid;gap:8px}.case{border:1px solid var(--line);border-radius:14px;padding:10px;background:#fff}.case b{font-size:13px}.case .meta{font-size:12px;color:var(--muted);margin-top:4px}.case.selected{outline:3px solid #facc15}.case .actions{display:flex;gap:6px;margin-top:8px}.case .actions button{padding:7px 8px;font-size:12px}.drop{border:2px dashed #b9c2e8;background:#f8fafc;border-radius:14px;padding:12px;text-align:center}.preview{max-width:100%;max-height:170px;border-radius:12px;margin-top:8px;display:none}
#mapWrap{overflow:auto;border:1px solid var(--line);border-radius:16px;background:white;touch-action:pan-x pan-y}.board{position:relative;display:grid;background:#fff;min-height:600px}.cell,.room,.time{border:1px solid #e5edf6}.room{position:sticky;left:0;z-index:4;background:#f8fafc;font-weight:900;font-size:11px;display:flex;align-items:center;justify-content:center;text-align:center;padding:3px}.room.virtual{background:#fef3c7;color:#92400e}.room.lane{background:#dbeafe;color:#1d4ed8}.room.support{background:#ffedd5;color:#c2410c}.time{background:#e2e8f0;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center}.block{position:absolute;height:38px;border-radius:11px;color:#fff;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;text-align:center;padding:3px 6px;box-shadow:0 4px 12px #0f172a40;overflow:hidden;touch-action:none}.pendente{background:linear-gradient(135deg,#60a5fa,#2563eb)}.externo{background:linear-gradient(135deg,#a78bfa,#7c3aed)}.escalado{background:linear-gradient(135deg,#22c55e,#15803d)}.finalizado{background:linear-gradient(135deg,#94a3b8,#64748b);opacity:.65}.virtualBlock{background:linear-gradient(135deg,#f59e0b,#d97706)!important}.now{position:absolute;top:0;bottom:0;width:2px;background:#38bdf8;z-index:6}.nowLabel{position:absolute;top:26px;transform:translateX(-50%);background:#38bdf8;color:#fff;border-radius:999px;padding:3px 6px;font-size:10px;font-weight:900;z-index:7}.modalBg{display:none;position:fixed;inset:0;background:#0f172a80;z-index:50;padding:14px;align-items:end}.modal{background:#fff;border-radius:18px;padding:14px;max-height:88vh;overflow:auto;width:100%;box-shadow:0 20px 60px #0008}.modal h2{margin:0 0 8px;font-size:18px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.full{grid-column:1/-1}.pill{display:inline-flex;border:1px solid var(--line);background:#f8fafc;border-radius:999px;padding:7px 10px;margin:4px;font-weight:900;font-size:12px}.pill.ok{background:#ecfdf5;color:#166534;border-color:#86efac}.pill.busy{background:#fff7ed;color:#9a3412;border-color:#fed7aa}.bottomBar{position:fixed;left:0;right:0;bottom:0;background:#ffffffee;backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:8px 10px calc(8px + env(safe-area-inset-bottom));display:flex;gap:8px;z-index:30}.bottomBar button{flex:1;padding:11px 6px;font-size:12px}body{padding-bottom:70px}@media(min-width:800px){main{max-width:1000px;margin:auto}.modalBg{align-items:center}.modal{max-width:720px;margin:auto}.date{width:160px}:root{--hourW:82px;--labelW:130px}}
</style>
</head>
<body>
<header>
  <div class="top"><div class="title">CC Sama Bolso<br><span class="small">localStorage · v1</span></div><input class="date" id="date" type="date"></div>
  <div class="tabs"><button class="tab active" data-tab="importar">Importar</button><button class="tab" data-tab="mapa">Mapa</button><button class="tab" data-tab="lista">Lista</button><button class="tab" data-tab="escala">Escala</button></div>
  <div class="kpis" id="kpis"></div>
</header>
<main>
  <section id="importar" class="panel active">
    <div class="card"><b>Foto para conferência</b><div class="drop"><input id="photo" type="file" accept="image/*" capture="environment"><div class="small">A foto não é lida automaticamente nesta versão; ela fica para conferir enquanto cola a lista extraída.</div><img id="preview" class="preview"></div></div>
    <div class="card"><label>Lista de cirurgias</label><textarea id="txtCases" placeholder="06:00 | Oeste 08 | Cirurgia | 90 | SMA | LPOG | 35"></textarea><div class="row"><button onclick="processCases()">Processar</button><button class="green" onclick="saveAll()">Salvar</button></div><div class="small">Formato aceito: Início | Sala | Cirurgia | Duração | Serviço | Iniciais | Idade | Obs</div><div id="importStatus" class="status">Pronto.</div></div>
  </section>
  <section id="mapa" class="panel"><div class="card"><div class="row"><button class="light" onclick="scrollNow()">Ir para agora</button><button class="light" onclick="openCaseForm()">+ Cirurgia</button></div></div><div id="mapWrap"><div id="board" class="board"></div></div></section>
  <section id="lista" class="panel"><div class="card"><div class="row"><button class="light" onclick="openCaseForm()">+ Cirurgia</button><button class="red" onclick="clearDay()">Limpar dia</button></div></div><div id="caseList" class="list"></div></section>
  <section id="escala" class="panel"><div class="card"><label>Lista de anestesistas</label><textarea id="txtAnes" placeholder="Nome | 07:00 | 19:00 | obs"></textarea><div class="row"><button class="purple" onclick="processAnes()">Processar escala</button><button class="green" onclick="openAnesForm()">+ Anestesista</button></div></div><div id="anesList" class="list"></div></section>
</main>
<div class="bottomBar"><button onclick="openCaseForm()">+ Caso</button><button class="green" onclick="assignSelected()">Escalar</button><button class="gray" onclick="saveAll()">Salvar</button></div>
<div id="modalBg" class="modalBg" onclick="closeModal(event)"><div id="modal" class="modal" onclick="event.stopPropagation()"></div></div>
<script>
const rooms=["Cirurgias não escaladas",...Array.from({length:10},(_,i)=>`Oeste ${String(i+1).padStart(2,'0')}`),...Array.from({length:10},(_,i)=>`Lane ${String(i+1).padStart(2,'0')}`),"CDI","Hemo"];
let items=[], anes=[], selectedId=null, currentDate=''; const startHour=5,endHour=23;
const $=id=>document.getElementById(id); const key=()=>`cc_sama_bolso_v1_${currentDate}`;
function today(){const d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,10)}
function uid(){return Math.random().toString(36).slice(2,10)}
function parseTime(t){const m=String(t||'').match(/(\d{1,2})[:h](\d{2})?/); if(!m)return null; return Number(m[1])*60+Number(m[2]||0)}
function fmt(min){min=Math.round(min||0);return String(Math.floor(min/60)).padStart(2,'0')+':'+String(min%60).padStart(2,'0')}
function dur(v){if(!v)return 90; if(String(v).includes(':')){const [h,m]=String(v).split(':').map(Number);return h*60+(m||0)} return Number(String(v).replace(/[^0-9]/g,''))||90}
function normRoom(s){s=String(s||'').toLowerCase(); if(!s||s.includes('não escal')||s.includes('nao escal')||s.includes('sem sala'))return 0; if(s.includes('hemo')||s.includes('radio')||s.includes('rádio'))return 22; if(s.includes('cdi'))return 21; const n=Number((s.match(/\d+/)||[])[0]); if(n>=1&&n<=10){ if(s.includes('lane'))return 10+n; return n;} return 0}
function normInitials(s){return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase().replace(/[^A-Z]/g,'').slice(0,6)}
function normAge(s){const m=String(s||'').match(/\d{1,3}/);return m?String(Number(m[0])):''}
function caseUid(c){const name=String(c.name||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase().replace(/[^A-Z0-9 ]/g,' ').replace(/\s+/g,' ').trim(); if(!name||!c.initials||!c.age)return ''; return [currentDate,name,c.initials,c.age].join('|')}
function ext(serv){const s=String(serv||'').toLowerCase();return s.includes('particular')||s.includes('externo')||s.includes('banco')||s.includes('reserva')}
function saveAll(){localStorage.setItem(key(),JSON.stringify({items,anes,updatedAt:new Date().toISOString()})); status('Salvo no localStorage deste navegador.','ok'); renderAll()}
function load(){const data=JSON.parse(localStorage.getItem(key())||'{}'); items=data.items||[]; anes=data.anes||[]; selectedId=null; renderAll(); status(`Carregado: ${items.length} cirurgias e ${anes.length} anestesistas.`,'ok')}
function status(msg){$('importStatus').textContent=msg}
function switchTab(t){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id===t)); if(t==='mapa')setTimeout(renderMap,50)}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));
$('date').onchange=()=>{saveAll();currentDate=$('date').value;load()};
$('photo').onchange=e=>{const f=e.target.files[0];if(f){$('preview').src=URL.createObjectURL(f);$('preview').style.display='block'}};
function processCases(){const lines=$('txtCases').value.split(/\n+/).map(x=>x.trim()).filter(Boolean);let add=0,upd=0;lines.forEach(line=>{const p=line.split('|').map(x=>x.trim()); if(p.length<4)return; const st=parseTime(p[0])??7*60; const c={id:uid(),type:'surgery',start:st,end:st+dur(p[3]),row:normRoom(p[1]),name:p[2]||'Cirurgia',service:p[4]||'',initials:normInitials(p[5]||''),age:normAge(p[6]||''),obs:p.slice(7).join(' | '),anesthetist:'',external:ext(p[4]),status:ext(p[4])?'externo':'pendente'}; c.case_uid=caseUid(c); const old=c.case_uid?items.find(i=>i.case_uid===c.case_uid):null; if(old){Object.assign(old,{row:c.row,start:c.start,end:c.end,name:c.name,service:c.service,initials:c.initials,age:c.age,obs:c.obs,external:c.external,status:c.external?'externo':(old.anesthetist?'escalado':'pendente')});upd++}else{items.push(c);add++}}); saveAll(); status(`Processado. Novas: ${add}. Atualizadas por UID: ${upd}. Total: ${items.length}.`); switchTab('lista')}
function processAnes(){const lines=$('txtAnes').value.split(/\n+/).map(x=>x.trim()).filter(Boolean);let add=0;lines.forEach(line=>{const p=line.split('|').map(x=>x.trim()); if(!p[0])return; const obj={id:uid(),name:p[0],start:parseTime(p[1])??7*60,end:parseTime(p[2])??19*60,obs:p.slice(3).join(' | ')}; const old=anes.find(a=>a.name.toLowerCase()===obj.name.toLowerCase()); if(old)Object.assign(old,obj); else{anes.push(obj);add++}}); saveAll(); switchTab('escala')}
function renderAll(){renderKpis();renderList();renderAnes();renderMap()}
function renderKpis(){const pend=items.filter(i=>!i.anesthetist&&!i.external&&i.status!=='finalizado').length; $('kpis').innerHTML=`<span class=kpi>${items.length} cirurgias</span><span class=kpi>${pend} sem anes</span><span class=kpi>${anes.length} anes</span><span class=kpi>${items.filter(i=>i.row===0).length} sem sala</span>`}
function renderList(){const sorted=[...items].sort((a,b)=>a.start-b.start);$('caseList').innerHTML=sorted.map(i=>`<div class="case ${i.id===selectedId?'selected':''}" onclick="selectCase('${i.id}')"><b>${fmt(i.start)} · ${rooms[i.row]} · ${esc(i.name)}</b><div class="meta">${i.end-i.start} min · ${esc(i.service||'')} · ${i.initials||'?'} ${i.age||'?'}a · ${i.external?'externo':(i.anesthetist||'sem anestesista')}</div><div class="actions"><button onclick="event.stopPropagation();openCaseForm('${i.id}')">Editar</button><button class="green" onclick="event.stopPropagation();openAssign('${i.id}')">Escalar</button><button class="red" onclick="event.stopPropagation();delCase('${i.id}')">X</button></div></div>`).join('')||'<div class="card small">Nenhuma cirurgia.</div>'}
function renderAnes(){$('anesList').innerHTML=anes.map(a=>`<div class="case"><b>${esc(a.name)}</b><div class="meta">${fmt(a.start)}-${fmt(a.end)} · ${esc(a.obs||'')}</div><div class="actions"><button onclick="openAnesForm('${a.id}')">Editar</button><button class="red" onclick="delAnes('${a.id}')">X</button></div></div>`).join('')||'<div class="card small">Nenhum anestesista.</div>'}
function renderMap(){const b=$('board'); if(!b)return; const hw=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--hourW')); const rh=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--rowH')); const lw=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--labelW')); const cols=endHour-startHour+1; b.innerHTML=''; b.style.gridTemplateColumns=`${lw}px repeat(${cols}, ${hw}px)`; b.style.gridTemplateRows=`32px repeat(${rooms.length}, ${rh}px)`; b.style.width=(lw+cols*hw)+'px'; b.style.height=(32+rooms.length*rh)+'px'; b.appendChild(div('time','Sala')); for(let h=startHour;h<=endHour;h++)b.appendChild(div('time',h+'h')); rooms.forEach((r,idx)=>{b.appendChild(div('room '+(idx===0?'virtual':idx>10&&idx<=20?'lane':idx>20?'support':''),r)); for(let h=startHour;h<=endHour;h++)b.appendChild(div('cell',''))}); const now=new Date(); const min=now.getHours()*60+now.getMinutes(); const x=lw+((min-startHour*60)/60)*hw; if(min>=startHour*60&&min<=endHour*60){const l=document.createElement('div');l.className='now';l.style.left=x+'px';b.appendChild(l);const lab=document.createElement('div');lab.className='nowLabel';lab.style.left=x+'px';lab.textContent='Agora '+fmt(min);b.appendChild(lab)} items.forEach(it=>{const el=document.createElement('div'); el.className='block '+(it.status||'pendente')+(it.row===0?' virtualBlock':''); el.textContent=it.name; el.style.left=(lw+((it.start-startHour*60)/60)*hw)+'px'; el.style.top=(32+it.row*rh+8)+'px'; el.style.width=Math.max(46,((it.end-it.start)/60)*hw-4)+'px'; el.onclick=e=>{e.stopPropagation();selectCase(it.id)}; el.ondblclick=e=>{e.stopPropagation();openCaseForm(it.id)}; b.appendChild(el)});}
function div(cls,txt){const d=document.createElement('div');d.className=cls;d.textContent=txt;return d}
function scrollNow(){const hw=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--hourW')); const lw=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--labelW')); const now=new Date();$('mapWrap').scrollLeft=Math.max(0,lw+((now.getHours()*60+now.getMinutes()-startHour*60)/60)*hw-120)}
function selectCase(id){selectedId=id;renderAll()}
function openModal(html){$('modal').innerHTML=html;$('modalBg').style.display='flex'}
function closeModal(e){if(!e||e.target.id==='modalBg'){$('modalBg').style.display='none';$('modal').innerHTML=''}}
function openCaseForm(id=''){const it=id?items.find(x=>x.id===id):null; const opt=rooms.map((r,i)=>`<option value="${i}" ${it&&it.row==i?'selected':''}>${r}</option>`).join(''); openModal(`<h2>${it?'Editar':'Nova'} cirurgia</h2><div class=grid2><label class=full>Cirurgia<input id=fName value="${esc(it?.name||'')}"></label><label>Sala<select id=fRoom>${opt}</select></label><label>Início<input id=fStart value="${it?fmt(it.start):'07:00'}"></label><label>Duração<input id=fDur value="${it?it.end-it.start:90}"></label><label>Serviço<input id=fServ value="${esc(it?.service||'SMA')}"></label><label>Iniciais<input id=fIni value="${esc(it?.initials||'')}"></label><label>Idade<input id=fAge value="${esc(it?.age||'')}"></label><label class=full>Obs<input id=fObs value="${esc(it?.obs||'')}"></label></div><div class=row style="margin-top:10px"><button class=green onclick="saveCase('${id}')">Salvar</button><button class=light onclick="closeModal()">Cancelar</button></div>`)}
function saveCase(id){const st=parseTime($('fStart').value)??7*60; const obj={id:id||uid(),type:'surgery',name:$('fName').value,row:Number($('fRoom').value),start:st,end:st+dur($('fDur').value),service:$('fServ').value,initials:normInitials($('fIni').value),age:normAge($('fAge').value),obs:$('fObs').value,anesthetist:id?(items.find(i=>i.id===id)?.anesthetist||''):'',external:ext($('fServ').value),status:ext($('fServ').value)?'externo':'pendente'}; obj.case_uid=caseUid(obj); if(id){Object.assign(items.find(i=>i.id===id),obj)}else items.push(obj); closeModal();saveAll()}
function openAnesForm(id=''){const a=id?anes.find(x=>x.id===id):null; openModal(`<h2>${a?'Editar':'Novo'} anestesista</h2><label>Nome<input id=aName value="${esc(a?.name||'')}"></label><div class=grid2><label>Início<input id=aStart value="${a?fmt(a.start):'07:00'}"></label><label>Fim<input id=aEnd value="${a?fmt(a.end):'19:00'}"></label></div><label>Obs<input id=aObs value="${esc(a?.obs||'')}"></label><div class=row style="margin-top:10px"><button class=green onclick="saveAnes('${id}')">Salvar</button><button class=light onclick="closeModal()">Cancelar</button></div>`)}
function saveAnes(id){const obj={id:id||uid(),name:$('aName').value,start:parseTime($('aStart').value)??7*60,end:parseTime($('aEnd').value)??19*60,obs:$('aObs').value}; if(id)Object.assign(anes.find(a=>a.id===id),obj); else anes.push(obj); closeModal();saveAll()}
function openAssign(id){const it=items.find(i=>i.id===id); if(!it)return; const cards=anes.map(a=>`<span class="pill ok" onclick="doAssign('${id}','${escAttr(a.name)}')">${esc(a.name)} · ${fmt(a.start)}-${fmt(a.end)}</span>`).join(''); openModal(`<h2>Escalar</h2><div class=small>${fmt(it.start)} · ${esc(it.name)}</div><div>${cards||'<div class=small>Nenhum anestesista cadastrado.</div>'}</div><div class=row style="margin-top:10px"><button class=purple onclick="markExternal('${id}')">Externo</button><button class=gray onclick="unassign('${id}')">Desescalar</button><button class=light onclick="closeModal()">Fechar</button></div>`)}
function assignSelected(){if(!selectedId)return alert('Selecione uma cirurgia.');openAssign(selectedId)}
function doAssign(id,name){const it=items.find(i=>i.id===id); if(it){it.anesthetist=name;it.external=false;it.status='escalado'} closeModal();saveAll()}
function markExternal(id){const it=items.find(i=>i.id===id); if(it){it.anesthetist='';it.external=true;it.status='externo'} closeModal();saveAll()}
function unassign(id){const it=items.find(i=>i.id===id); if(it){it.anesthetist='';it.external=false;it.status='pendente'} closeModal();saveAll()}
function delCase(id){if(confirm('Deletar cirurgia?')){items=items.filter(i=>i.id!==id);if(selectedId===id)selectedId=null;saveAll()}}
function delAnes(id){if(confirm('Remover anestesista?')){anes=anes.filter(a=>a.id!==id);saveAll()}}
function clearDay(){if(confirm('Limpar todas as cirurgias e anestesistas desta data?')){items=[];anes=[];saveAll()}}
function esc(s){return String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;')}
function escAttr(s){return esc(s).replaceAll("'",'&#039;')}
function init(){currentDate=today();$('date').value=currentDate;load();setInterval(()=>{if(document.getElementById('mapa').classList.contains('active'))renderMap()},60000)}
init();
</script>
</body>
</html>
