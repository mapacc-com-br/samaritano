<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-store">
<title>Recuperar senha - MAPA CC</title>
<link rel="icon" href="/favicon.svg?v=20260521-refactor" type="image/svg+xml">
<link rel="stylesheet" href="/assets/css/reset-senha.css?v=20260521-refactor">
<link rel="stylesheet" href="/assets/css/theme.css?v=20260521-refactor">
</head>
<body>
<main class="card">
  <div class="brand">MAPA CC</div>
  <section id="requestBox">
    <h1>Recuperar senha</h1>
    <div class="sub">Informe seu usuario ou e-mail cadastrado. Se encontrarmos um e-mail vinculado, enviaremos um link de redefinicao.</div>
    <label>Usuario ou e-mail</label>
    <input id="identificador" autocomplete="username email">
    <button id="btnRequest">Enviar link</button>
  </section>

  <section id="resetBox" class="hidden">
    <h1>Nova senha</h1>
    <div class="sub">Digite sua nova senha para concluir a recuperacao.</div>
    <label>Nova senha</label>
    <input id="newPassword" type="password" autocomplete="new-password">
    <label>Confirmar senha</label>
    <input id="confirmPassword" type="password" autocomplete="new-password">
    <button class="green" id="btnReset">Salvar nova senha</button>
  </section>

  <div id="status" class="status">Pronto.</div>
  <a class="link" href="/login.html">Voltar ao login</a>
</main>

<script src="/assets/js/reset-senha.js?v=20260521-refactor"></script>
<script src="/assets/js/version.js?v=20260521-refactor"></script>
</body>
</html>
