<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Sala operacional - MAPA CC</title>
<style>
:root{--bg:#101820;--panel:#f7f9fc;--card:#fff;--line:#d8e0ea;--text:#111827;--muted:#667085;--blue:#2454ff;--green:#168a5b;--amber:#b7791f;--red:#c2410c}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:radial-gradient(circle at 15% 10%,#24384a 0,#101820 34%,#0c1118 100%);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--text)}
header{color:white;padding:28px 18px 22px}
.head{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr auto;gap:14px;align-items:end}
.brand{font-size:13px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:#a7b4c6}
h1{margin:8px 0 6px;font-size:34px;line-height:1.05}
.sub{color:#c8d2df;font-size:14px}
.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
button,a.btn{border:0;border-radius:12px;background:var(--blue);color:white;font-weight:900;padding:11px 14px;text-decoration:none;cursor:pointer;font:inherit;display:inline-flex;align-items:center;justify-content:center}
button.light,a.light{background:#ffffff14;border:1px solid #ffffff33;color:white}
button.dark,a.dark{background:#172033;color:white}
main{background:var(--panel);border-radius:24px 24px 0 0;min-height:calc(100vh - 148px);padding:18px}
.wrap{max-width:1100px;margin:0 auto}
.toolbar{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:end;margin-bottom:14px}
label{display:block;font-size:12px;font-weight:900;color:var(--muted);margin-bottom:5px;text-transform:uppercase}
input{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;background:white;font:inherit}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px;box-shadow:0 8px 22px #1018280a}
.card h2{margin:0 0 8px;font-size:18px}
.meta{font-size:13px;color:var(--muted);line-height:1.45}
.pill{display:inline-flex;border-radius:999px;padding:5px 9px;font-size:11px;font-weight:900;margin:10px 6px 12px 0;border:1px solid var(--line);background:#f8fafc;color:#344054}
.pill.edit{background:#ecfdf3;color:#067647;border-color:#abefc6}
.pill.view{background:#eff4ff;color:#3538cd;border-color:#c7d7fe}
.pill.warn{background:#fffaeb;color:#b54708;border-color:#fedf89}
.empty{border:1px dashed #b9c4d2;border-radius:16px;padding:20px;text-align:center;color:var(--muted);background:#fff}
.status{margin-top:12px;padding:10px;border-radius:12px;background:#eff6ff;color:#1d4ed8;font-size:13px;font-weight:800;white-space:pre-wrap}
.status.err{background:#fff1f2;color:#be123c}
@media(max-width:680px){.head,.toolbar{grid-template-columns:1fr}.actions{justify-content:flex-start}h1{font-size:28px}main{border-radius:18px 18px 0 0}}
</style>
<link rel="stylesheet" href="/mapacc-theme.css">
</head>
<body>
<header>
  <div class="head">
    <div>
      <div class="brand">MAPA CC</div>
      <h1>Sala operacional</h1>
      <div class="sub" id="welcome">Carregando sua central de hospitais...</div>
    </div>
    <div class="actions">
      <a class="btn light" href="/reg.html" id="adminLink" style="display:none">Acessos</a>
      <button class="light" id="btnLogout">Sair</button>
    </div>
  </div>
</header>

<main>
  <div class="wrap">
    <div class="toolbar">
      <div>
        <label>Data operacional</label>
        <input id="dataSala" type="date">
      </div>
      <button class="dark" id="btnAtualizar">Sincronizar sala</button>
    </div>

    <div id="hospitais" class="grid"></div>
    <div id="status" class="status">Pronto.</div>
  </div>
</main>

<script>
const $ = id => document.getElementById(id);
let me = null;

function todayISO(offset=0){
  const d = new Date();
  d.setDate(d.getDate()+offset);
  const tz = d.getTimezoneOffset()*60000;
  return new Date(d-tz).toISOString().slice(0,10);
}

function brDate(iso){
  if(!iso)return '--';
  const p=iso.split('-');
  return p[2]+'/'+p[1]+'/'+p[0];
}

function status(msg, cls=''){
  $('status').className='status '+cls;
  $('status').textContent=msg;
}

async function api(url,opt={}){
  const r = await fetch(url,{headers:{'Content-Type':'application/json'},cache:'no-store',...opt});
  const data = await r.json().catch(()=>({}));
  if(!r.ok || data.ok===false) throw new Error(data.error || ('HTTP '+r.status));
  return data;
}

function cardHospital(h){
  const edit = Number(h.pode_editar) === 1;
  const papel = h.papel_dia || 'visualizacao';
  const data = $('dataSala').value;
  return `
    <div class="card">
      <h2>${escapeHtml(h.nome)}</h2>
      <div class="meta">${escapeHtml(h.tipo || 'hospital')} · ${escapeHtml(brDate(data))}</div>
      <div>
        <span class="pill ${edit ? 'edit' : 'view'}">${edit ? 'pode editar' : 'somente leitura'}</span>
        <span class="pill ${papel === 'visualizacao' ? 'warn' : ''}">${escapeHtml(papel)}</span>
      </div>
      <a class="btn" href="/index_graf.html?hospital_id=${encodeURIComponent(h.id)}&data=${encodeURIComponent(data)}">Abrir painel</a>
    </div>
  `;
}

async function load(){
  try{
    const data = $('dataSala').value || todayISO();
    let resp = await api('/api/me?data='+encodeURIComponent(data));
    if(resp.user && resp.user.role === 'escalador' && !params.get('data') && data === todayISO()){
      $('dataSala').value = todayISO(1);
      resp = await api('/api/me?data='+encodeURIComponent($('dataSala').value));
    }
    me = resp.user;
    $('welcome').textContent = 'Logado como '+me.username+' · perfil '+roleLabel(me);
    $('adminLink').style.display = (me.role === 'admin' || me.admin_plus) ? 'inline-flex' : 'none';
    const hospitais = resp.hospitais || [];
    $('hospitais').innerHTML = hospitais.length
      ? hospitais.map(cardHospital).join('')
      : '<div class="empty">Nenhum hospital disponivel para esta data.</div>';
    status(hospitais.length+' hospital(is) disponivel(is) em '+brDate(data)+'.','');
  }catch(e){
    status(e.message,'err');
    if(String(e.message).toLowerCase().includes('autenticado')) location.href='/login.html?next=/sala.html';
  }
}

function escapeHtml(value){
  return String(value ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;");
}

function roleLabel(user){
  return user && (user.admin_plus || String(user.username || '').trim().toLowerCase() === 'godofredo') ? 'admin+' : String((user && user.role) || '');
}

const params = new URLSearchParams(location.search);
$('dataSala').value = params.get('data') || todayISO();
$('btnAtualizar').onclick = load;
$('dataSala').onchange = load;
$('btnLogout').onclick = async ()=>{
  await fetch('/api/logout',{method:'POST'});
  location.href='/login.html';
};
load();
</script>
</body>
</html>
