<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Usuarios e perfis - MAPA CC</title>
<style>
:root{--bg:#eef2f7;--card:#fff;--line:#d8e0ee;--text:#172033;--muted:#64748b;--blue:#2563eb;--green:#16a34a;--red:#dc2626}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--text)}
header{position:sticky;top:0;z-index:10;background:#fffffff0;border-bottom:1px solid var(--line);backdrop-filter:blur(10px);padding:14px}
h1{font-size:20px;margin:0}.sub{font-size:12px;color:var(--muted);margin-top:4px}
.wrap{max-width:1040px;margin:0 auto;padding:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 8px 24px #0f172a0d}
h2{font-size:16px;margin:0 0 10px}
label{font-size:13px;font-weight:800;margin:10px 0 6px;display:block}
input,select{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;font:inherit;background:#fff;color:var(--text)}
button{border:0;border-radius:10px;background:var(--blue);color:#fff;font-weight:900;padding:10px 12px;font:inherit;cursor:pointer}
button.green{background:var(--green)}button.red{background:var(--red)}button.light{background:#fff;color:var(--text);border:1px solid var(--line)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px}
.status{margin-top:10px;border-radius:10px;padding:10px;font-size:13px;font-weight:800;background:#eff6ff;color:#1e3a8a}
.status.ok{background:#dcfce7;color:#166534}.status.err{background:#fee2e2;color:#991b1b}.status.warn{background:#fef3c7;color:#92400e}
.mark{position:fixed;right:10px;top:10px;z-index:50;background:#111827;color:#fff;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:900}
.user{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
.head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.name{font-weight:900;font-size:16px}.scaleName{font-weight:800;color:#0f766e;margin-top:3px}.meta{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.45}
.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.actions button{padding:8px 10px;font-size:13px}
.badge{display:inline-flex;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900;background:#e2e8f0;color:#334155}
.badge.ok{background:#dcfce7;color:#166534}.badge.err{background:#fee2e2;color:#991b1b}.badge.plus{background:#fef3c7;color:#92400e}
.editor{border-top:1px solid var(--line);margin-top:12px;padding-top:12px}
.checks{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:7px;margin-top:6px}
.check{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px;font-size:13px;font-weight:800}
.check input{width:auto}.empty{border:1px dashed var(--line);border-radius:12px;padding:16px;color:var(--muted);font-weight:800}
small{color:var(--muted)}
@media(max-width:720px){.grid2,.grid3{grid-template-columns:1fr}.head{display:block}.actions{justify-content:flex-start;margin-top:10px}.mark{top:auto;bottom:10px}}
</style>
<link rel="stylesheet" href="/mapacc-theme.css">
</head>
<body>
<div class="mark">MAPA CC</div>
<header>
  <h1>Usuarios e perfis</h1>
  <div class="sub" id="who">Carregando...</div>
</header>

<main class="wrap">
  <section class="card">
    <h2>Acoes</h2>
    <div class="row">
      <button onclick="location.href='/sala.html'">Abrir sala</button>
      <button class="light" onclick="load()">Recarregar</button>
      <button class="red" id="logoutBtn">Sair</button>
    </div>
    <div class="status" id="status">Carregando...</div>
  </section>

  <section class="card">
    <h2>Novo usuario</h2>
    <form id="addForm">
      <div class="grid2">
        <div>
          <label>Usuario</label>
          <input id="addUser" required autocomplete="off">
        </div>
        <div>
          <label>Nome da escala</label>
          <input id="addNomeEscala" autocomplete="off" placeholder="Como aparece na escala">
        </div>
      </div>
      <div class="grid2">
        <div>
          <label>Senha</label>
          <input id="addPass" required type="password" autocomplete="new-password">
        </div>
        <div>
          <label>E-mail para recuperar senha</label>
          <input id="addEmail" type="email" autocomplete="email" placeholder="nome@hospital.com.br">
        </div>
      </div>
      <div class="grid2">
        <div>
          <label>Atribuicao</label>
          <select id="addRole">
            <option value="admin">Admin</option>
            <option value="escalador">Escalador</option>
            <option value="coordenador">Coordenador</option>
            <option value="plantonista">Plantonista</option>
          </select>
        </div>
        <div>
          <label>Status</label>
          <select id="addAtivo">
            <option value="1">Ativo</option>
            <option value="0">Inativo</option>
          </select>
        </div>
      </div>
      <label>Empresas</label>
      <div class="checks" id="addEmpresas"></div>
      <label>Hospitais</label>
      <div class="checks" id="addHospitals"></div>
      <div class="row">
        <button class="green" type="submit">Adicionar</button>
        <button class="light" type="button" onclick="location.href='/admin_clinicas.html'">Cadastrar empresa</button>
      </div>
    </form>
  </section>

  <section class="card">
    <h2>Usuarios cadastrados</h2>
    <div id="users"></div>
  </section>
</main>

<script>
const $ = id => document.getElementById(id);
let hospitals = [];
let empresas = [];
let users = [];
let editing = null;

function esc(v){
  return String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function status(msg, cls=''){
  $('status').className = 'status ' + cls;
  $('status').textContent = msg;
}

async function api(url, body){
  const opt = body === undefined
    ? {headers:{'Content-Type':'application/json'}}
    : {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)};
  const r = await fetch(url, opt);
  const data = await r.json().catch(()=>({}));
  if(!r.ok || data.ok === false) throw new Error((data.error || 'Erro de API') + ' ['+url+']');
  return data;
}

function isPlus(u){
  return !!u && (u.admin_plus || String(u.username || '').toLowerCase() === 'godofredo');
}

function roleLabel(u){
  return isPlus(u) ? 'admin+' : String((u && u.role) || '');
}

function roleOptions(selected){
  return ['admin','escalador','coordenador','plantonista'].map(r => '<option value="'+r+'" '+(r===selected?'selected':'')+'>'+r+'</option>').join('');
}

function ids(user){
  return String((user && user.hospital_ids) || '').split(',').map(Number).filter(Boolean);
}

function empresaIds(user){
  return String((user && user.empresa_ids) || '').split(',').map(Number).filter(Boolean);
}

function displayScaleName(user){
  return String((user && user.nome_escala) || (user && user.username) || '').trim();
}

function hospitalChecks(cls, selectedIds){
  const selected = new Set(selectedIds || []);
  if(!hospitals.length) return '<small>Nenhum hospital disponivel.</small>';
  return hospitals.map(h => {
    const id = Number(h.id);
    return '<label class="check"><input class="'+cls+'" type="checkbox" value="'+id+'" '+(selected.has(id)?'checked':'')+'> '+esc(h.nome)+'</label>';
  }).join('');
}

function empresaChecks(cls, selectedIds){
  const selected = new Set(selectedIds || []);
  if(!empresas.length) return '<small>Nenhuma empresa disponivel.</small>';
  return empresas.map(e => {
    const id = Number(e.id);
    return '<label class="check"><input class="'+cls+'" type="checkbox" value="'+id+'" '+(selected.has(id)?'checked':'')+'> '+esc(e.nome)+'</label>';
  }).join('');
}

function checked(cls, root=document){
  return [...root.querySelectorAll('.'+cls+':checked')].map(x => Number(x.value)).filter(Boolean);
}

function renderAddEmpresas(){
  $('addEmpresas').innerHTML = empresaChecks('addEmpresa', []);
}

function renderAddHospitals(){
  $('addHospitals').innerHTML = hospitalChecks('addHospital', []);
}

function render(){
  if(!users.length){
    $('users').innerHTML = '<div class="empty">Nenhum usuario cadastrado.</div>';
    return;
  }
  $('users').innerHTML = users.map(u => {
    const ativo = Number(u.ativo) !== 0;
    const hosp = u.hospitais || (u.role === 'admin' || isPlus(u) ? 'acesso global' : 'sem hospital');
    const emp = u.empresas || (u.role === 'admin' || isPlus(u) ? 'acesso global' : 'sem empresa');
    return '<article class="user" data-id="'+Number(u.id)+'">'+
      '<div class="head">'+
        '<div><div class="name">'+esc(u.username)+'</div>'+
        '<div class="scaleName">Nome da escala: '+esc(displayScaleName(u))+'</div>'+
        '<div class="meta">senha: protegida / trocar no editar | atribuicao: '+esc(roleLabel(u))+' | e-mail: '+esc(u.email || 'nao informado')+' | empresas: '+esc(emp)+' | hospitais: '+esc(hosp)+'</div></div>'+
        '<div class="actions">'+(isPlus(u)?'<span class="badge plus">admin+</span>':'')+'<span class="badge '+(ativo?'ok':'err')+'">'+(ativo?'ativo':'inativo')+'</span><button class="light" data-edit="'+u.id+'">Editar</button><button class="red" data-del="'+u.id+'">Deletar</button></div>'+
      '</div>'+
      (editing === Number(u.id) ? editor(u) : '')+
    '</article>';
  }).join('');
}

function editor(u){
  return '<div class="editor">'+
    '<div class="grid2">'+
      '<div><label>Usuario</label><input data-username value="'+esc(u.username)+'"></div>'+
      '<div><label>Nome da escala</label><input data-nome-escala value="'+esc(displayScaleName(u))+'" placeholder="Como aparece na escala"></div>'+
    '</div>'+
    '<div class="grid3">'+
      '<div><label>E-mail</label><input data-email type="email" value="'+esc(u.email || '')+'" placeholder="nome@hospital.com.br"></div>'+
      '<div><label>Atribuicao</label><select data-role>'+roleOptions(u.role)+'</select></div>'+
      '<div><label>Status</label><select data-ativo><option value="1" '+(Number(u.ativo)!==0?'selected':'')+'>Ativo</option><option value="0" '+(Number(u.ativo)===0?'selected':'')+'>Inativo</option></select></div>'+
    '</div>'+
    '<label>Nova senha</label><input data-password type="password" placeholder="Deixe vazio para manter a senha">'+
    '<label>Empresas</label><div class="checks">'+empresaChecks('editEmpresa', empresaIds(u))+'</div>'+
    '<label>Hospitais</label><div class="checks">'+hospitalChecks('editHospital', ids(u))+'</div>'+
    '<div class="row"><button class="green" data-save="'+u.id+'">Salvar</button><button class="light" data-cancel="'+u.id+'">Cancelar</button></div>'+
  '</div>';
}

async function load(){
  try{
    const me = await api('/api/me');
    $('who').textContent = 'Logado como '+me.user.username+' - '+roleLabel(me.user);
    const emp = await api('/api/admin-empresas');
    empresas = emp.empresas || [];
    renderAddEmpresas();
    const h = await api('/api/hospitais');
    hospitals = h.hospitais || [];
    renderAddHospitals();
    const u = await api('/api/users');
    users = u.users || [];
    render();
    status('Pronto para adicionar, editar e deletar usuarios.', 'ok');
  }catch(e){
    status(e.message, 'err');
    if(String(e.message).toLowerCase().includes('autenticado')) location.href = '/login.html?next=/usuarios1.html';
  }
}

$('addForm').onsubmit = async ev => {
  ev.preventDefault();
  const username = $('addUser').value.trim();
  try{
    await api('/api/users', {
      username,
      nome_escala:$('addNomeEscala').value.trim() || username,
      email:$('addEmail').value.trim(),
      password:$('addPass').value,
      role:$('addRole').value,
      ativo:$('addAtivo').value,
      empresa_ids:checked('addEmpresa'),
      hospital_ids:checked('addHospital')
    });
    $('addUser').value = '';
    $('addNomeEscala').value = '';
    $('addEmail').value = '';
    $('addPass').value = '';
    document.querySelectorAll('.addEmpresa:checked').forEach(x => x.checked = false);
    document.querySelectorAll('.addHospital:checked').forEach(x => x.checked = false);
    await load();
    status('Usuario adicionado.', 'ok');
  }catch(e){
    status(e.message, 'err');
  }
};

$('users').onclick = async ev => {
  const edit = ev.target.closest('[data-edit]');
  const cancel = ev.target.closest('[data-cancel]');
  const save = ev.target.closest('[data-save]');
  const del = ev.target.closest('[data-del]');

  if(edit){
    editing = Number(edit.dataset.edit);
    render();
    return;
  }
  if(cancel){
    editing = null;
    render();
    return;
  }
  if(save){
    await saveUser(Number(save.dataset.save));
    return;
  }
  if(del){
    await deleteUser(Number(del.dataset.del));
  }
};

async function saveUser(id){
  try{
    const card = document.querySelector('[data-id="'+id+'"]');
    const username = card.querySelector('[data-username]').value.trim();
    await api('/api/users', {
      action:'update',
      id,
      username,
      nome_escala:card.querySelector('[data-nome-escala]').value.trim() || username,
      email:card.querySelector('[data-email]').value.trim(),
      role:card.querySelector('[data-role]').value,
      ativo:card.querySelector('[data-ativo]').value,
      password:card.querySelector('[data-password]').value,
      empresa_ids:checked('editEmpresa', card),
      hospital_ids:checked('editHospital', card)
    });
    editing = null;
    await load();
    status('Usuario atualizado.', 'ok');
  }catch(e){
    status(e.message, 'err');
  }
}

async function deleteUser(id){
  try{
    const user = users.find(u => Number(u.id) === id);
    if(!confirm('Deletar '+(user ? user.username : 'este usuario')+'?')) return;
    await api('/api/users', {action:'delete', id});
    await load();
    status('Usuario deletado.', 'ok');
  }catch(e){
    status(e.message, 'err');
  }
}

$('logoutBtn').onclick = async () => {
  await fetch('/api/logout', {method:'POST'});
  location.href = '/login.html';
};

load();
</script>
<script src="/mapacc-version.js?v=20260518-1545"></script>
</body>
</html>
