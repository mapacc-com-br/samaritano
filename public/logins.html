<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Logins - MAPA CC</title>
<style>
:root{--bg:#eef2f7;--card:#fff;--line:#d8e0ee;--text:#172033;--muted:#64748b;--blue:#2563eb;--green:#16a34a;--red:#dc2626}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--text)}
header{position:sticky;top:0;background:#fffffff2;border-bottom:1px solid var(--line);padding:14px;z-index:10}
h1{font-size:20px;margin:0}.sub{font-size:12px;color:var(--muted);margin-top:4px}
.wrap{max-width:980px;margin:0 auto;padding:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 8px 24px #0f172a0d}
h2{font-size:16px;margin:0 0 10px}label{display:block;font-size:13px;font-weight:800;margin:10px 0 6px}
input,select{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;font:inherit;background:#fff}
button{border:0;border-radius:10px;background:var(--blue);color:#fff;font:inherit;font-weight:900;padding:10px 12px;cursor:pointer}
button.green{background:var(--green)}button.red{background:var(--red)}button.light{background:#fff;color:var(--text);border:1px solid var(--line)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px}
.status{margin-top:10px;border-radius:10px;padding:10px;background:#eff6ff;color:#1e3a8a;font-size:13px;font-weight:800}
.status.ok{background:#dcfce7;color:#166534}.status.err{background:#fee2e2;color:#991b1b}
.mark{position:fixed;right:10px;top:10px;background:#111827;color:#fff;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:900;z-index:50}
.user{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
.head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.name{font-size:16px;font-weight:900}.meta{font-size:13px;color:var(--muted);margin-top:4px}
.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.actions button{padding:8px 10px;font-size:13px}
.badge{display:inline-flex;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900;background:#e2e8f0;color:#334155}
.badge.ok{background:#dcfce7;color:#166534}.badge.err{background:#fee2e2;color:#991b1b}.badge.plus{background:#fef3c7;color:#92400e}
.editor{border-top:1px solid var(--line);margin-top:12px;padding-top:12px}
.checks{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:7px;margin-top:6px}
.check{display:flex;gap:8px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px;font-size:13px;font-weight:800}.check input{width:auto}
.empty{border:1px dashed var(--line);border-radius:12px;padding:16px;color:var(--muted);font-weight:800}
@media(max-width:720px){.grid,.grid3{grid-template-columns:1fr}.head{display:block}.actions{justify-content:flex-start;margin-top:10px}.mark{top:auto;bottom:10px}}
</style>
<link rel="stylesheet" href="/mapacc-theme.css">
</head>
<body>
<div class="mark">MAPA CC</div>
<header>
  <h1>Logins e acessos</h1>
  <div class="sub" id="who">Carregando...</div>
</header>
<main class="wrap">
  <section class="card">
    <h2>Acoes</h2>
    <div class="row">
      <button onclick="location.href='/sala.html'">Abrir sala</button>
      <button class="light" onclick="load()">Recarregar</button>
      <button class="red" id="logout">Sair</button>
    </div>
    <div class="status" id="status">Carregando...</div>
  </section>

  <section class="card">
    <h2>Novo login</h2>
    <form id="addForm">
      <div class="grid">
        <div><label>Usuario</label><input id="newUser" required></div>
        <div><label>Senha</label><input id="newPass" type="password" required></div>
      </div>
      <div class="grid">
        <div><label>Atribuicao</label><select id="newRole"><option value="admin">Admin</option><option value="escalador">Escalador</option><option value="coordenador">Coordenador</option><option value="plantonista">Plantonista</option></select></div>
        <div><label>Status</label><select id="newAtivo"><option value="1">Ativo</option><option value="0">Inativo</option></select></div>
      </div>
      <label>Hospitais</label>
      <div id="newHospitals" class="checks"></div>
      <div class="row"><button class="green" type="submit">Adicionar</button></div>
    </form>
  </section>

  <section class="card">
    <h2>Usuarios cadastrados</h2>
    <div id="list"></div>
  </section>
</main>

<script>
const $ = id => document.getElementById(id);
let hospitals = [];
let users = [];
let editing = null;

function esc(v){return String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function setStatus(msg, cls=''){$('status').className='status '+cls;$('status').textContent=msg}
async function get(url){const r=await fetch(url,{headers:{'Content-Type':'application/json'}});const d=await r.json().catch(()=>({}));if(!r.ok||d.ok===false)throw new Error((d.error||'Erro de API')+' ['+url+']');return d}
async function post(url, body){const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json().catch(()=>({}));if(!r.ok||d.ok===false)throw new Error((d.error||'Erro de API')+' ['+url+']');return d}
function plus(u){return !!u && (u.admin_plus || String(u.username||'').toLowerCase()==='godofredo')}
function roleLabel(u){return plus(u)?'admin+':String((u&&u.role)||'')}
function ids(u){return String((u&&u.hospital_ids)||'').split(',').map(Number).filter(Boolean)}
function roleOpts(sel){return ['admin','escalador','coordenador','plantonista'].map(r=>'<option value="'+r+'" '+(r===sel?'selected':'')+'>'+r+'</option>').join('')}
function hospitalChecks(cls, selectedIds){
  const selected = new Set(selectedIds || []);
  return hospitals.length ? hospitals.map(h => '<label class="check"><input class="'+cls+'" type="checkbox" value="'+Number(h.id)+'" '+(selected.has(Number(h.id))?'checked':'')+'> '+esc(h.nome)+'</label>').join('') : '<div class="empty">Nenhum hospital disponivel.</div>';
}
function checked(cls, root=document){return [...root.querySelectorAll('.'+cls+':checked')].map(x=>Number(x.value)).filter(Boolean)}

async function load(){
  try{
    const me = await get('/api/me');
    $('who').textContent = 'Logado como '+me.user.username+' - '+roleLabel(me.user);
    hospitals = (await get('/api/hospitais')).hospitais || [];
    $('newHospitals').innerHTML = hospitalChecks('newHospital', []);
    users = (await get('/api/users')).users || [];
    render();
    setStatus('Pronto para adicionar, editar e deletar.', 'ok');
  }catch(e){
    setStatus(e.message, 'err');
    if(String(e.message).toLowerCase().includes('autenticado')) location.href='/login.html?next=/logins.html';
  }
}

function render(){
  $('list').innerHTML = users.length ? users.map(u => {
    const active = Number(u.ativo)!==0;
    const hosp = u.hospitais || (u.role==='admin'||plus(u)?'acesso global':'sem hospital');
    return '<article class="user" data-id="'+Number(u.id)+'">'+
      '<div class="head"><div><div class="name">'+esc(u.username)+'</div><div class="meta">senha: protegida/trocar no editar | atribuicao: '+esc(roleLabel(u))+' | hospitais: '+esc(hosp)+'</div></div>'+
      '<div class="actions">'+(plus(u)?'<span class="badge plus">admin+</span>':'')+'<span class="badge '+(active?'ok':'err')+'">'+(active?'ativo':'inativo')+'</span><button class="light" data-edit="'+u.id+'">Editar</button><button class="red" data-del="'+u.id+'">Deletar</button></div></div>'+
      (editing===Number(u.id)?editor(u):'')+'</article>';
  }).join('') : '<div class="empty">Nenhum usuario cadastrado.</div>';
}

function editor(u){
  return '<div class="editor"><div class="grid3">'+
    '<div><label>Usuario</label><input data-username value="'+esc(u.username)+'"></div>'+
    '<div><label>Atribuicao</label><select data-role>'+roleOpts(u.role)+'</select></div>'+
    '<div><label>Status</label><select data-ativo><option value="1" '+(Number(u.ativo)!==0?'selected':'')+'>Ativo</option><option value="0" '+(Number(u.ativo)===0?'selected':'')+'>Inativo</option></select></div>'+
    '</div><label>Nova senha</label><input data-password type="password" placeholder="Vazio mantem a senha atual">'+
    '<label>Hospitais</label><div class="checks">'+hospitalChecks('editHospital', ids(u))+'</div>'+
    '<div class="row"><button class="green" data-save="'+u.id+'">Salvar</button><button class="light" data-cancel="'+u.id+'">Cancelar</button></div></div>';
}

$('addForm').onsubmit = async ev => {
  ev.preventDefault();
  try{
    await post('/api/users', {username:$('newUser').value.trim(), password:$('newPass').value, role:$('newRole').value, ativo:$('newAtivo').value, hospital_ids:checked('newHospital')});
    $('newUser').value='';$('newPass').value='';
    await load();
    setStatus('Usuario adicionado.', 'ok');
  }catch(e){setStatus(e.message,'err')}
};

$('list').onclick = async ev => {
  const edit = ev.target.closest('[data-edit]');
  const cancel = ev.target.closest('[data-cancel]');
  const save = ev.target.closest('[data-save]');
  const del = ev.target.closest('[data-del]');
  if(edit){editing=Number(edit.dataset.edit);render();return}
  if(cancel){editing=null;render();return}
  if(save){await saveUser(Number(save.dataset.save));return}
  if(del){await deleteUser(Number(del.dataset.del));return}
};

async function saveUser(id){
  try{
    const card=document.querySelector('[data-id="'+id+'"]');
    await post('/api/users', {action:'update', id, username:card.querySelector('[data-username]').value.trim(), role:card.querySelector('[data-role]').value, ativo:card.querySelector('[data-ativo]').value, password:card.querySelector('[data-password]').value, hospital_ids:checked('editHospital', card)});
    editing=null; await load(); setStatus('Usuario atualizado.', 'ok');
  }catch(e){setStatus(e.message,'err')}
}

async function deleteUser(id){
  try{
    const u=users.find(x=>Number(x.id)===id);
    if(!confirm('Deletar '+(u?u.username:'este usuario')+'?'))return;
    await post('/api/users', {action:'delete', id});
    await load(); setStatus('Usuario deletado.', 'ok');
  }catch(e){setStatus(e.message,'err')}
}

$('logout').onclick = async () => {await fetch('/api/logout',{method:'POST'});location.href='/login.html'};
load();
</script>
</body>
</html>
