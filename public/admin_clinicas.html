<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-store">
<title>Clinicas e hospitais - MAPA CC</title>
<style>
:root{--bg:#eef2f7;--card:#fff;--line:#d8e0ee;--text:#172033;--muted:#64748b;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--amber:#b45309}
*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--text)}
header{position:sticky;top:0;z-index:10;background:#fffffff2;border-bottom:1px solid var(--line);padding:14px}
h1{font-size:20px;margin:0}.sub{font-size:12px;color:var(--muted);margin-top:4px}
.pageHead{max-width:1020px;margin:0 auto;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}
.account{display:flex;gap:8px;align-items:center;justify-content:flex-end}
.accountChip{display:flex;gap:8px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 9px;box-shadow:0 4px 14px #0f172a0d}
.avatar{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;background:#e0f2fe;color:#0f172a;font-size:12px;font-weight:1000}
.accountName{font-size:13px;font-weight:900;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.accountRole{font-size:11px;color:var(--muted);font-weight:800}
.wrap{max-width:1020px;margin:0 auto;padding:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 8px 24px #0f172a0d}
h2{font-size:16px;margin:0 0 10px}label{display:block;font-size:13px;font-weight:800;margin:10px 0 6px}
input,select,textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;font:inherit;background:#fff;color:var(--text)}
textarea{min-height:98px;resize:vertical}
button{border:0;border-radius:10px;background:var(--blue);color:#fff;font:inherit;font-weight:900;padding:10px 12px;cursor:pointer}
button.green{background:var(--green)}button.red{background:var(--red)}button.light{background:#fff;color:var(--text);border:1px solid var(--line)}
.grid{display:grid;grid-template-columns:1fr 180px;gap:10px}.grid3{display:grid;grid-template-columns:1fr 170px auto;gap:10px;align-items:end}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px}.status{margin-top:10px;border-radius:10px;padding:10px;background:#eff6ff;color:#1e3a8a;font-size:13px;font-weight:800;white-space:pre-wrap}
.status.ok{background:#dcfce7;color:#166534}.status.err{background:#fee2e2;color:#991b1b}.status.warn{background:#fef3c7;color:#92400e}
.item{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
.head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.name{font-weight:900;font-size:16px}.meta{font-size:13px;color:var(--muted);margin-top:4px}
.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.actions button{padding:8px 10px;font-size:13px}
.badge{display:inline-flex;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900;background:#e2e8f0;color:#334155}.badge.clinica{background:#ecfdf5;color:#166534}.badge.hospital{background:#eff6ff;color:#1e40af}
.editor{border-top:1px solid var(--line);margin-top:12px;padding-top:12px}
.checks{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:7px;margin-top:6px}
.check{display:flex;gap:8px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px;font-size:13px;font-weight:800}.check input{width:auto}
.empty{border:1px dashed var(--line);border-radius:12px;padding:16px;color:var(--muted);font-weight:800}
.mark{position:fixed;right:10px;top:10px;background:#111827;color:#fff;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:900;z-index:50}
@media(max-width:720px){.grid,.grid3,.pageHead{grid-template-columns:1fr}.head{display:block}.actions,.account{justify-content:flex-start;margin-top:10px}.mark{top:auto;bottom:10px}button{width:100%}.accountChip{width:100%}}
</style>
<link rel="stylesheet" href="/mapacc-theme.css">
</head>
<body>
<div class="mark">MAPA CC</div>
<header>
  <div class="pageHead">
    <div>
      <h1>Clinicas e hospitais</h1>
      <div class="sub" id="who">Carregando...</div>
    </div>
    <div class="account">
      <div class="accountChip">
        <span class="avatar" id="sessionAvatar">--</span>
        <span><span class="accountName" id="sessionName">Conta</span><br><span class="accountRole" id="sessionRole">Perfil</span></span>
      </div>
      <button class="light" onclick="location.href='/sala.html'">Sala</button>
      <button class="red" id="logoutTop">Sair</button>
    </div>
  </div>
</header>
<main class="wrap">
  <section class="card">
    <h2>Acoes</h2>
    <div class="row">
      <button onclick="location.href='/sala.html'">Abrir sala</button>
      <button class="light" onclick="load()">Recarregar</button>
      <button class="light" id="btnBackup">Baixar backup JSON</button>
      <button class="light" id="btnImportBackup">Importar backup</button>
    </div>
    <input id="backupFile" type="file" accept="application/json,.json" style="display:none">
    <div class="status" id="status">Carregando...</div>
  </section>

  <section class="card">
    <h2>Adicionar hospital ou clinica</h2>
    <form id="addForm">
      <div class="grid">
        <div><label>Nome</label><input id="newNome" required placeholder="Ex: Hospital Samaritano"></div>
        <div><label>Tipo</label><select id="newTipo"><option value="hospital">Hospital</option><option value="clinica">Clinica</option></select></div>
      </div>
      <label>Salas iniciais</label>
      <textarea id="newSalas" placeholder="Uma sala por linha. Ex:&#10;Sala 01&#10;Sala 02&#10;CDI"></textarea>
      <div class="row"><button class="green" type="submit">Adicionar</button></div>
    </form>
  </section>

  <section class="card">
    <h2>Empresas</h2>
    <form id="companyForm">
      <label>Nome da empresa</label>
      <input id="companyNome" required placeholder="Ex: SMA, Takaoka">
      <label>Hospitais administrados</label>
      <div id="companyHospitals" class="checks"></div>
      <div class="row"><button class="green" type="submit">Salvar empresa</button></div>
    </form>
    <div id="companyList"></div>
  </section>

  <section class="card">
    <h2>Chave OpenAI</h2>
    <div class="status" id="openaiStatus">Carregando configuracao...</div>
    <form id="openaiForm">
      <label>Nova chave OpenAI</label>
      <input id="openaiKey" type="password" placeholder="sk-proj-..." autocomplete="off">
      <div class="row"><button class="green" type="submit">Salvar chave no banco</button></div>
    </form>
  </section>

  <section class="card">
    <h2>Cadastrados</h2>
    <div id="list"></div>
  </section>
</main>

<script>
const $ = id => document.getElementById(id);
let hospitals = [];
let companies = [];
let editing = null;
let editingCompany = null;

function esc(v){return String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function status(msg, cls=''){$('status').className='status '+cls;$('status').textContent=msg}
function openaiStatus(msg, cls=''){$('openaiStatus').className='status '+cls;$('openaiStatus').textContent=msg}
function isPlus(u){return !!u && (u.admin_plus || String(u.username||'').toLowerCase()==='godofredo')}
function roleLabel(u){return isPlus(u)?'admin+':String((u&&u.role)||'')}
function initials(name){const clean=String(name||'').trim();return clean?clean.split(/\s+/).slice(0,2).map(p=>p[0]).join('').toUpperCase():'--'}
function renderSession(u){$('sessionAvatar').textContent=initials(u.username);$('sessionName').textContent=u.username||'Conta';$('sessionRole').textContent=roleLabel(u)}
function ids(value){return String(value||'').split(',').map(Number).filter(Boolean)}
function hospitalChecks(cls, selectedIds){const selected=new Set(selectedIds||[]);return hospitals.length?hospitals.map(h=>'<label class="check"><input class="'+cls+'" type="checkbox" value="'+Number(h.id)+'" '+(selected.has(Number(h.id))?'checked':'')+'> '+esc(h.nome)+'</label>').join(''):'<div class="empty">Nenhum hospital cadastrado.</div>'}
function checked(cls, root=document){return [...root.querySelectorAll('.'+cls+':checked')].map(x=>Number(x.value)).filter(Boolean)}

async function api(url, opt={}){
  const r = await fetch(url,{headers:{'Content-Type':'application/json'},cache:'no-store',...opt});
  const data = await r.json().catch(()=>({}));
  if(!r.ok || data.ok===false) throw new Error((data.error || 'Erro de API')+' ['+url+']');
  return data;
}

function salasFromText(value){
  return String(value||'').split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
}

async function load(){
  try{
    const me = await api('/api/me');
    if(!(me.user && (me.user.role === 'admin' || isPlus(me.user)))) throw new Error('Acesso restrito ao admin');
    $('who').textContent = 'Logado como '+me.user.username+' - '+roleLabel(me.user);
    renderSession(me.user);
    hospitals = (await api('/api/admin-hospitais')).hospitais || [];
    companies = (await api('/api/admin-empresas')).empresas || [];
    $('companyHospitals').innerHTML = hospitalChecks('companyHospital', []);
    render();
    renderCompanies();
    await loadOpenAIConfig();
    status(hospitals.length+' hospital(is)/clinica(s) cadastrados.', 'ok');
  }catch(e){
    status(e.message, 'err');
    if(String(e.message).toLowerCase().includes('autenticado')) location.href='/login.html?next=/admin_clinicas.html';
  }
}

async function loadOpenAIConfig(){
  try{
    const cfg = await api('/api/admin-config/openai');
    openaiStatus(
      cfg.configurada
        ? 'Chave configurada. Origem: '+(cfg.origem || 'desconhecida')+' | tamanho: '+cfg.tamanho+' | modelo: '+cfg.model
        : 'Chave OpenAI ainda nao configurada.',
      cfg.configurada ? 'ok' : 'warn'
    );
  }catch(e){
    openaiStatus('Falha ao verificar chave: '+e.message, 'err');
  }
}

function render(){
  $('list').innerHTML = hospitals.length ? hospitals.map(h => {
    const id = Number(h.id);
    return '<article class="item" data-id="'+id+'">'+
      '<div class="head">'+
        '<div><div class="name">'+esc(h.nome)+'</div>'+
        '<div class="meta">empresas: '+esc(h.empresas || 'sem empresa')+' | slug: '+esc(h.slug || '-')+' | salas: '+Number(h.total_salas || 0)+' | usuarios vinculados: '+Number(h.total_usuarios || 0)+'</div></div>'+
        '<div class="actions"><span class="badge '+esc(h.tipo || 'hospital')+'">'+esc(h.tipo || 'hospital')+'</span><button class="light" data-edit="'+id+'">Editar</button><button class="red" data-del="'+id+'">Deletar</button></div>'+
      '</div>'+
      (editing === id ? editor(h) : '')+
    '</article>';
  }).join('') : '<div class="empty">Nenhum hospital ou clinica cadastrado.</div>';
}

function editor(h){
  return '<div class="editor">'+
    '<div class="grid3">'+
      '<div><label>Nome</label><input data-nome value="'+esc(h.nome)+'"></div>'+
      '<div><label>Tipo</label><select data-tipo><option value="hospital" '+(h.tipo==='hospital'?'selected':'')+'>Hospital</option><option value="clinica" '+(h.tipo==='clinica'?'selected':'')+'>Clinica</option></select></div>'+
      '<div class="row"><button class="green" data-save="'+Number(h.id)+'">Salvar</button><button class="light" data-cancel="'+Number(h.id)+'">Cancelar</button></div>'+
    '</div>'+
  '</div>';
}

function renderCompanies(){
  $('companyList').innerHTML = companies.length ? companies.map(e => {
    const id = Number(e.id);
    return '<article class="item" data-company-id="'+id+'">'+
      '<div class="head">'+
        '<div><div class="name">'+esc(e.nome)+'</div>'+
        '<div class="meta">hospitais: '+esc(e.hospitais || 'nenhum')+' | usuarios vinculados: '+Number(e.total_usuarios || 0)+'</div></div>'+
        '<div class="actions"><button class="light" data-company-edit="'+id+'">Editar</button><button class="red" data-company-del="'+id+'">Deletar</button></div>'+
      '</div>'+
      (editingCompany === id ? companyEditor(e) : '')+
    '</article>';
  }).join('') : '<div class="empty">Nenhuma empresa cadastrada.</div>';
}

function companyEditor(e){
  return '<div class="editor"><label>Nome</label><input data-company-nome value="'+esc(e.nome)+'"><label>Hospitais administrados</label><div class="checks">'+hospitalChecks('editCompanyHospital', ids(e.hospital_ids))+'</div><div class="row"><button class="green" data-company-save="'+Number(e.id)+'">Salvar</button><button class="light" data-company-cancel="'+Number(e.id)+'">Cancelar</button></div></div>';
}

$('addForm').onsubmit = async ev => {
  ev.preventDefault();
  try{
    await api('/api/hospitais',{
      method:'POST',
      body:JSON.stringify({nome:$('newNome').value.trim(),tipo:$('newTipo').value,salas:salasFromText($('newSalas').value)})
    });
    $('newNome').value='';$('newTipo').value='hospital';$('newSalas').value='';
    await load();
    status('Hospital/clinica adicionado.', 'ok');
  }catch(e){status(e.message, 'err')}
};

$('companyForm').onsubmit = async ev => {
  ev.preventDefault();
  try{
    await api('/api/empresas',{
      method:'POST',
      body:JSON.stringify({nome:$('companyNome').value.trim(),hospital_ids:checked('companyHospital')})
    });
    $('companyNome').value='';
    await load();
    status('Empresa cadastrada.', 'ok');
  }catch(e){status(e.message, 'err')}
};

$('openaiForm').onsubmit = async ev => {
  ev.preventDefault();
  try{
    const apiKey = $('openaiKey').value.trim();
    await api('/api/admin-config/openai', {
      method:'POST',
      body:JSON.stringify({api_key:apiKey})
    });
    $('openaiKey').value = '';
    await loadOpenAIConfig();
    status('Chave OpenAI salva no banco persistente.', 'ok');
  }catch(e){
    openaiStatus(e.message, 'err');
  }
};

$('btnBackup').onclick = () => {
  location.href = '/api/admin-backup';
};

$('btnImportBackup').onclick = () => {
  $('backupFile').click();
};

$('backupFile').onchange = async ev => {
  const file = ev.target.files && ev.target.files[0];
  ev.target.value = '';
  if(!file) return;
  if(!confirm('Importar este backup para o banco atual? Registros com o mesmo ID serao atualizados.')) return;
  try{
    const text = await file.text();
    const payload = JSON.parse(text);
    const resp = await api('/api/admin-backup/import', {
      method:'POST',
      body:JSON.stringify(payload)
    });
    await load();
    status('Backup importado: '+JSON.stringify(resp.importado), 'ok');
  }catch(e){
    status('Falha ao importar backup: '+e.message, 'err');
  }
};

$('list').onclick = async ev => {
  const edit = ev.target.closest('[data-edit]');
  const cancel = ev.target.closest('[data-cancel]');
  const save = ev.target.closest('[data-save]');
  const del = ev.target.closest('[data-del]');
  if(edit){editing=Number(edit.dataset.edit);render();return}
  if(cancel){editing=null;render();return}
  if(save){await saveHospital(Number(save.dataset.save));return}
  if(del){await deleteHospital(Number(del.dataset.del));return}
};

$('companyList').onclick = async ev => {
  const edit = ev.target.closest('[data-company-edit]');
  const cancel = ev.target.closest('[data-company-cancel]');
  const save = ev.target.closest('[data-company-save]');
  const del = ev.target.closest('[data-company-del]');
  if(edit){editingCompany=Number(edit.dataset.companyEdit);renderCompanies();return}
  if(cancel){editingCompany=null;renderCompanies();return}
  if(save){await saveCompany(Number(save.dataset.companySave));return}
  if(del){await deleteCompany(Number(del.dataset.companyDel));return}
};

async function saveHospital(id){
  try{
    const card = document.querySelector('[data-id="'+id+'"]');
    await api('/api/hospitais/'+encodeURIComponent(id),{
      method:'PUT',
      body:JSON.stringify({nome:card.querySelector('[data-nome]').value.trim(),tipo:card.querySelector('[data-tipo]').value})
    });
    editing=null;
    await load();
    status('Hospital/clinica atualizado.', 'ok');
  }catch(e){status(e.message, 'err')}
}

async function deleteHospital(id){
  try{
    const h = hospitals.find(x => Number(x.id) === id);
    if(!confirm('Deletar '+(h ? h.nome : 'este cadastro')+'? Ele deixara de aparecer para os usuarios.')) return;
    await api('/api/hospitais/'+encodeURIComponent(id),{method:'DELETE'});
    await load();
    status('Hospital/clinica deletado.', 'ok');
  }catch(e){status(e.message, 'err')}
}

async function saveCompany(id){
  try{
    const card = document.querySelector('[data-company-id="'+id+'"]');
    await api('/api/empresas',{
      method:'POST',
      body:JSON.stringify({id,nome:card.querySelector('[data-company-nome]').value.trim(),hospital_ids:checked('editCompanyHospital',card)})
    });
    editingCompany=null;
    await load();
    status('Empresa atualizada.', 'ok');
  }catch(e){status(e.message, 'err')}
}

async function deleteCompany(id){
  try{
    const e = companies.find(x => Number(x.id) === id);
    if(!confirm('Deletar '+(e ? e.nome : 'esta empresa')+'? Os hospitais nao serao apagados.')) return;
    await api('/api/empresas/'+encodeURIComponent(id),{method:'DELETE'});
    await load();
    status('Empresa deletada.', 'ok');
  }catch(e){status(e.message, 'err')}
}

$('logoutTop').onclick = async () => {$('logoutTop').textContent='Saindo...';$('logoutTop').disabled=true;await fetch('/api/logout',{method:'POST'});location.href='/login.html?logout=1'};
load();
</script>
</body>
</html>
