<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CC Sama DB Inspector</title><style>
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:#eef2f7;color:#0f172a}header{position:sticky;top:0;background:white;border-bottom:1px solid #dbe3ef;padding:12px;z-index:5}.title{font-size:18px;font-weight:900}.sub{font-size:12px;color:#64748b}main{padding:12px;max-width:1100px;margin:0 auto}.card{background:white;border:1px solid #dbe3ef;border-radius:16px;padding:12px;margin-bottom:12px;box-shadow:0 6px 18px #0f172a0d}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}label{font-size:12px;font-weight:900;color:#334155;display:block;margin-bottom:4px}input{border:1px solid #dbe3ef;border-radius:12px;padding:10px;font:inherit;min-width:220px}button{border:0;border-radius:12px;padding:10px 12px;font-weight:900;color:white;background:#2563eb}button.green{background:#16a34a}button.light{background:#f8fafc;color:#0f172a;border:1px solid #dbe3ef}.status{white-space:pre-wrap;font-size:12px;font-weight:700;color:#1e3a8a;background:#eff6ff;border:1px solid #bfdbfe;border-radius:14px;padding:10px}.warn{color:#92400e;background:#fffbeb;border-color:#fde68a}.ok{color:#166534;background:#ecfdf5;border-color:#bbf7d0}.item{border:1px solid #e2e8f0;border-radius:14px;padding:10px;margin:8px 0}.name{font-weight:900}.meta{font-size:12px;color:#64748b;margin-top:4px;word-break:break-word}pre{white-space:pre-wrap;word-break:break-word;background:#0f172a;color:#e2e8f0;border-radius:14px;padding:12px;font-size:11px;max-height:60vh;overflow:auto}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}@media(max-width:720px){.grid{grid-template-columns:1fr}.row button{flex:1}input{min-width:0;width:100%}}
</style></head><body><header><div class="title">CC Sama DB Inspector</div><div class="sub">Consulta o conteúdo salvo no banco por data via /api/plantao/:data</div></header><main><div class="card"><div class="grid"><div><label>Data</label><input type="date" id="dataMapa"></div><div><label>API base</label><input id="apiBase" placeholder="Ex: https://seu-app.up.railway.app"></div></div><div class="row" style="margin-top:10px"><button id="btnConsultar">Consultar</button><button class="green" id="btnStatus">/api/status</button><button class="light" id="btnCopiar">Copiar JSON</button></div><div id="status" class="status" style="margin-top:10px">Pronto.</div></div><div class="card"><div class="name">Resumo</div><div id="resumo" class="meta">Nada consultado.</div></div><div class="card"><div class="name">Cirurgias salvas</div><div id="lista"></div></div><div class="card"><div class="name">JSON bruto</div><pre id="json">{}</pre></div></main><script>
(function(){'use strict';let last={};const $=id=>document.getElementById(id);function todayISO(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}function esc(s){return String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')}function apiBase(){let v=$('apiBase').value.trim().replace(/\/$/,'');if(v){localStorage.setItem('ccsama_api_base',v);return v}localStorage.removeItem('ccsama_api_base');return window.location.origin}function apiUrl(p){return apiBase()+p}function status(msg,cls=''){const e=$('status');e.className='status '+cls;e.textContent=msg}function fmt(min){min=Math.round(Number(min)||0);return String(Math.floor(min/60)).padStart(2,'0')+':'+String(min%60).padStart(2,'0')}const rooms=["Cirurgias não escaladas",...Array.from({length:10},(_,i)=>`Oeste ${String(i+1).padStart(2,'0')}`),...Array.from({length:10},(_,i)=>`Lane ${String(i+1).padStart(2,'0')}`),"CDI","HEMO"];async function consultar(){try{status('Consultando...','warn');const d=$('dataMapa').value;const r=await fetch(apiUrl('/api/plantao/'+encodeURIComponent(d)+'?t='+Date.now()),{cache:'no-store'});if(!r.ok)throw new Error(await r.text());last=await r.json();render();status('Consulta OK.','ok')}catch(e){status('Erro:\n'+e.message,'warn')}}function render(){const items=Array.isArray(last.items)?last.items:[];const anes=Array.isArray(last.anesthetists)?last.anesthetists:[];$('resumo').innerHTML=`Data: <b>${esc($('dataMapa').value)}</b><br>Cirurgias: <b>${items.length}</b><br>Anestesistas: <b>${anes.length}</b><br>Atualizado em: <b>${esc(last.updatedAt||'—')}</b>`;$('lista').innerHTML=items.length?items.slice().sort((a,b)=>(a.start||0)-(b.start||0)).map((it,i)=>`<div class="item"><div class="name">${i+1}. ${esc(fmt(it.start))} · ${esc(rooms[it.row]||it.row)} · ${esc(it.name)}</div><div class="meta">Fim: ${esc(fmt(it.end))} · Status: ${esc(it.status||'')} · Externo: ${it.external?'sim':'não'} · Anes: ${esc(it.anesthetist||'—')}<br>Paciente: ${esc(it.initials||'—')} · ${esc(it.age||'—')} anos<br>UID: ${esc(it.case_uid||'sem UID')}<br>Obs: ${esc(it.obs||'')}</div></div>`).join(''):'<div class="meta">Nenhuma cirurgia salva nessa data.</div>';$('json').textContent=JSON.stringify(last,null,2)}async function apiStatus(){try{status('Consultando /api/status...','warn');const r=await fetch(apiUrl('/api/status?t='+Date.now()),{cache:'no-store'});if(!r.ok)throw new Error(await r.text());const data=await r.json();status(JSON.stringify(data,null,2),'ok')}catch(e){status('Erro no /api/status:\n'+e.message,'warn')}}function copiar(){navigator.clipboard?.writeText(JSON.stringify(last,null,2)).then(()=>status('JSON copiado.','ok')).catch(()=>status('Não consegui copiar automaticamente.','warn'))}function init(){const q=new URLSearchParams(location.search);$('dataMapa').value=q.get('data')||todayISO();$('apiBase').value=localStorage.getItem('ccsama_api_base')||'';$('btnConsultar').addEventListener('click',consultar);$('btnStatus').addEventListener('click',apiStatus);$('btnCopiar').addEventListener('click',copiar);consultar()}document.addEventListener('DOMContentLoaded',init)})();
</script></body></html>
