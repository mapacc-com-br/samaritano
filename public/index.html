<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-store">
<title>MAPA CC</title>
<style>
:root{--bg:#101820;--text:#f8fafc;--muted:#b6c3d1;--card:#ffffff12;--line:#ffffff26}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 15% 10%,#24384a 0,#101820 36%,#0b1017 100%);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--text);padding:22px}
.card{width:min(420px,100%);border:1px solid var(--line);background:var(--card);border-radius:22px;padding:24px;box-shadow:0 24px 70px #0007}
h1{margin:0 0 8px;font-size:30px}.sub{color:var(--muted);font-size:14px;line-height:1.45}.status{margin-top:16px;color:#dbeafe;font-weight:900;font-size:13px}
</style>
<link rel="stylesheet" href="/mapacc-theme.css">
</head>
<body>
<main class="card">
  <h1>MAPA CC</h1>
  <div class="sub">Organizando seu acesso operacional.</div>
  <div class="status" id="status">Verificando login...</div>
</main>
<script>
(async function(){
  const status = document.getElementById('status');
  try{
    const r = await fetch('/api/me', {cache:'no-store'});
    if(r.status === 401){
      location.replace('/login.html?next=/sala.html');
      return;
    }
    if(!r.ok) throw new Error('Falha ao verificar login');
    status.textContent = 'Login confirmado. Abrindo sala...';
    location.replace('/sala.html');
  }catch(e){
    location.replace('/login.html?next=/sala.html');
  }
})();
</script>
</body>
</html>
