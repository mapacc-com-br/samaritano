<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>CC Sama Bolso v0 — DB</title>
<style>
:root{--bg:#f3f6fb;--card:#fff;--ink:#101827;--muted:#657187;--line:#d9e1ef;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--purple:#6d28d9;--orange:#f59e0b;--shadow:0 12px 32px rgba(15,23,42,.08)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--ink)}
.app{max-width:1120px;margin:auto;padding:22px 18px 70px}.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}.title{font-size:34px;font-weight:900;margin:0}.sub{font-size:18px;color:var(--muted);font-weight:700;margin:6px 0 0}.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}.date{font-size:20px;font-weight:800;padding:16px 18px;border:2px solid var(--line);border-radius:20px;background:#fff;min-width:220px}button,input,textarea,select{font:inherit}button{border:0;border-radius:18px;padding:16px 22px;font-size:19px;font-weight:900;cursor:pointer}.btn-blue{background:var(--blue);color:white}.btn-green{background:var(--green);color:white}.btn-red{background:var(--red);color:white}.btn-soft{background:#eaf0fb;color:#233253;border:2px solid var(--line)}
.tabs{display:flex;gap:12px;margin:18px 0;overflow:auto;padding-bottom:4px}.tab{min-width:150px}.tab.active{background:var(--blue);color:#fff}.status{padding:14px 18px;border-radius:18px;font-weight:800;margin:12px 0}.ok{background:#eafaf0;color:#166534;border:1px solid #bbf7d0}.bad{background:#fff1f2;color:#991b1b;border:1px solid #fecdd3}.card{background:var(--card);border:2px solid var(--line);border-radius:28px;padding:22px;margin:18px 0;box-shadow:var(--shadow)}.card h2{margin:0 0 16px;font-size:28px}.grid{display:grid;grid-template-columns:repeat(4,minmax(130px,1fr));gap:12px}.field label{display:block;font-weight:800;color:var(--muted);margin:0 0 6px}.field input,.field select,.field textarea{width:100%;border:2px solid var(--line);border-radius:16px;padding:13px 14px;background:#fff;font-size:17px}.field textarea{min-height:150px}.span2{grid-column:span 2}.span4{grid-column:span 4}.chips{display:flex;gap:10px;flex-wrap:wrap}.chip{border:2px solid var(--line);border-radius:999px;padding:10px 16px;font-weight:900;background:#fff}.chip.green{color:#166534;background:#ecfdf5;border-color:#bbf7d0}.chip.red{color:#991b1b;background:#fff1f2;border-color:#fecdd3}.chip.purple{color:#5b21b6;background:#f5f3ff;border-color:#ddd6fe}
.board{display:grid;grid-template-columns:90px repeat(5,minmax(150px,1fr));gap:10px;overflow:auto}.roomHead,.timeCell{position:sticky;background:#fff;z-index:3}.roomHead{top:0;border:2px solid var(--line);border-radius:16px;padding:12px;font-weight:900;text-align:center}.timeCell{left:0;border:2px solid var(--line);border-radius:16px;padding:10px;font-weight:900;color:var(--muted)}.lane{min-height:680px;border:2px dashed var(--line);border-radius:20px;background:#fafcff;position:relative;padding:8px}.surg{position:absolute;left:8px;right:8px;border-radius:16px;padding:10px 12px;background:#dbeafe;border:2px solid #93c5fd;box-shadow:0 6px 18px rgba(37,99,235,.15);overflow:hidden}.surg b{display:block;font-size:16px}.surg small{display:block;color:#1e3a8a;font-weight:800;margin-top:3px}.handle{position:absolute;right:8px;bottom:7px;width:34px;height:8px;background:white;border-radius:99px}.listItem{border:2px solid var(--line);border-radius:18px;padding:14px;margin:10px 0;background:#fff;display:flex;justify-content:space-between;gap:12px}.listItem b{font-size:18px}.hidden{display:none}@media(max-width:760px){.app{padding:18px 12px}.title{font-size:28px}.grid{grid-template-columns:1fr 1fr}.span2,.span4{grid-column:span 2}button{font-size:17px;padding:14px 18px}.board{grid-template-columns:78px repeat(5,150px)}}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div><h1 class="title">CC Sama Bolso v0 — DB</h1><p class="sub">Interface limpa + SQLite do zero via Node/Express. Sem localStorage.</p></div>
    <div class="row"><input id="day" class="date" type="date"><button class="btn-soft" onclick="loadState()">Carregar</button><button class="btn-green" onclick="loadState()">Salvar</button></div>
  </div>
  <div class="tabs"><button class="tab active" onclick="showTab('import',this)">Importar</button><button class="tab btn-soft" onclick="showTab('map',this)">Mapa</button><button class="tab btn-soft" onclick="showTab('list',this)">Lista</button><button class="tab btn-soft" onclick="showTab('anes',this)">Anes</button></div>
  <div id="status" class="status bad">Conectando na API...</div>

  <section id="import" class="view">
    <div class="card"><h2>Importar lista</h2><div class="field span4"><label>Formato: Início | Sala | Cirurgia | Duração | Serviço | Iniciais | Idade | Obs</label><textarea id="importText" placeholder="07:00 | Oeste 03 | Colecistectomia | 120 | SMA | A B C | 45"></textarea></div><br><div class="row"><button class="btn-blue" onclick="processImport()">Processar lista</button><button class="btn-soft" onclick="example()">Exemplo</button><button class="btn-red" onclick="importText.value=''">Limpar campo</button></div></div>
    <div class="card"><h2>Resumo</h2><div class="chips"><span class="chip" id="cSurg">0 cirurgias</span><span class="chip green" id="cAnes">0 anestesistas</span><span class="chip red" id="cNoAnes">0 sem anestesista</span><span class="chip purple" id="cUnscaled">0 não escaladas</span></div></div>
  </section>

  <section id="map" class="view hidden"><div class="card"><h2>Mapa gráfico</h2><div id="board" class="board"></div></div></section>

  <section id="list" class="view hidden"><div class="card"><h2>Nova cirurgia</h2><div class="grid"><div class="field"><label>Início</label><input id="fStart" value="07:00"></div><div class="field"><label>Sala</label><select id="fRoom"></select></div><div class="field span2"><label>Cirurgia</label><input id="fTitle" placeholder="Nome da cirurgia"></div><div class="field"><label>Duração</label><input id="fDur" type="number" value="90"></div><div class="field"><label>Serviço</label><input id="fService" placeholder="SMA"></div><div class="field"><label>Iniciais</label><input id="fIni"></div><div class="field"><label>Idade</label><input id="fAge"></div></div><br><button class="btn-blue" onclick="addSurgery()">Adicionar</button></div><div class="card"><h2>Lista</h2><div id="listBox"></div></div></section>

  <section id="anes" class="view hidden"><div class="card"><h2>Anestesistas</h2><div class="row"><input id="anesName" class="date" placeholder="Nome do anestesista"><button class="btn-blue" onclick="addAnes()">Adicionar</button></div><div id="anesBox" class="chips" style="margin-top:16px"></div></div></section>
</div>
<script>
const rooms = ['Lane 01','Lane 02','Lane 03','Lane 04','Oeste 01','Oeste 02','Oeste 03','Oeste 04','Hemo','Cirurgias não escaladas'];
let state = { surgeries: [], anesthetists: [] };
const $ = id => document.getElementById(id);
$('day').value = new Date().toISOString().slice(0,10);
rooms.forEach(r => $('fRoom').insertAdjacentHTML('beforeend', `<option>${r}</option>`));

function api(path, opt={}){ return fetch(path, { headers:{'Content-Type':'application/json'}, ...opt }).then(r=>r.json()); }
function setStatus(ok,msg){ const el=$('status'); el.className='status '+(ok?'ok':'bad'); el.textContent=msg; }
function showTab(id,btn){ document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden')); $(id).classList.remove('hidden'); document.querySelectorAll('.tab').forEach(t=>{t.className='tab btn-soft'}); btn.className='tab active'; if(id==='map') renderBoard(); }
async function loadState(){ try{ state = await api('/api/state/'+$('day').value); if(!state.ok) throw new Error(state.error); setStatus(true,'API conectada. Dados carregados do SQLite.'); renderAll(); } catch(e){ setStatus(false,'API indisponível: '+e.message); } }
function renderAll(){ $('cSurg').textContent=state.surgeries.length+' cirurgias'; $('cAnes').textContent=state.anesthetists.length+' anestesistas'; $('cNoAnes').textContent=state.surgeries.filter(s=>!s.anesthetist_id).length+' sem anestesista'; $('cUnscaled').textContent=state.surgeries.filter(s=>s.room==='Cirurgias não escaladas').length+' não escaladas'; renderList(); renderAnes(); renderBoard(); }
function minutes(t){ const [h,m]=(t||'07:00').split(':').map(Number); return h*60+m; }
function renderBoard(){ const shown=['Lane 01','Lane 02','Lane 03','Oeste 01','Oeste 02']; const board=$('board'); board.innerHTML='<div></div>'+shown.map(r=>`<div class="roomHead">${r}</div>`).join(''); for(let h=6;h<=20;h++){ board.insertAdjacentHTML('beforeend',`<div class="timeCell">${String(h).padStart(2,'0')}:00</div>`); shown.forEach(r=>board.insertAdjacentHTML('beforeend',`<div class="lane" data-room="${r}" data-h="${h}"></div>`)); } document.querySelectorAll('.lane').forEach(l=>{ const r=l.dataset.room, h=Number(l.dataset.h); state.surgeries.filter(s=>s.room===r && Math.floor(minutes(s.start)/60)===h).forEach(s=>{ const top=((minutes(s.start)%60)/60)*80+8; const height=Math.max(48,(Number(s.duration)||60)/60*80); l.insertAdjacentHTML('beforeend',`<div class="surg" style="top:${top}px;height:${height}px"><b>${s.start} · ${s.title}</b><small>${s.service||''} ${s.initials||''} ${s.age||''}</small><div class="handle"></div></div>`); }); }); }
function renderList(){ $('listBox').innerHTML = state.surgeries.map(s=>`<div class="listItem"><div><b>${s.start} | ${s.room} | ${s.title}</b><br><span>${s.duration} min · ${s.service||'-'} · ${s.initials||''} ${s.age||''}</span></div><button class="btn-red" onclick="delSurgery(${s.id})">Excluir</button></div>`).join('') || '<p>Nenhuma cirurgia.</p>'; }
function renderAnes(){ $('anesBox').innerHTML = state.anesthetists.map(a=>`<span class="chip green">${a.name}</span>`).join('') || '<span class="chip">Nenhum anestesista</span>'; }
async function addSurgery(){ await api('/api/surgeries',{method:'POST',body:JSON.stringify({day:$('day').value,start:$('fStart').value,room:$('fRoom').value,title:$('fTitle').value,duration:$('fDur').value,service:$('fService').value,initials:$('fIni').value,age:$('fAge').value})}); await loadState(); }
async function delSurgery(id){ await api('/api/surgeries/'+id,{method:'DELETE'}); await loadState(); }
async function addAnes(){ await api('/api/anesthetists',{method:'POST',body:JSON.stringify({name:$('anesName').value})}); $('anesName').value=''; await loadState(); }
function parseLine(line){ const p=line.split('|').map(x=>x.trim()); return {start:p[0],room:p[1],title:p[2],duration:p[3],service:p[4],initials:p[5],age:p[6],obs:p[7]||''}; }
async function processImport(){ const items=$('importText').value.split('\n').map(x=>x.trim()).filter(Boolean).map(parseLine); const r=await api('/api/import',{method:'POST',body:JSON.stringify({day:$('day').value,items})}); if(r.ok) setStatus(true,`Importei ${r.inserted} cirurgias no SQLite.`); else setStatus(false,r.error); await loadState(); }
function example(){ $('importText').value='07:00 | Oeste 03 | Colecistectomia | 120 | SMA | A B C | 45\n08:30 | Lane 02 | Herniorrafia inguinal | 90 | Anestesista Particular | D E F | 62\n09:00 | Cirurgias não escaladas | Artroscopia | 60 | SMA | G H I | 38'; }
loadState();
</script>
</body>
</html>
