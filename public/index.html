<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sistema de Cirurgias</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:20px;
  background:#f4f6fb;
  font-family:Arial,Helvetica,sans-serif;
  color:#111827;
}

.wrap{
  max-width:1400px;
  margin:0 auto;
}

.card{
  background:white;
  border-radius:16px;
  border:1px solid #e5e7eb;
  padding:18px;
  margin-bottom:16px;
}

.grid{
  display:grid;
  grid-template-columns:
    100px
    1fr
    100px
    120px
    130px
    180px
    100px
    90px;
  gap:10px;
}

label{
  display:block;
  font-size:12px;
  margin-bottom:4px;
  color:#6b7280;
}

input,select{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #d1d5db;
}

button{
  border:0;
  background:#2563eb;
  color:white;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

button.red{
  background:#dc2626;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border-bottom:1px solid #e5e7eb;
  padding:10px;
  text-align:left;
}

th{
  background:#f9fafb;
}

.status{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  background:#f9fafb;
}

pre{
  background:#111827;
  color:#d1d5db;
  padding:14px;
  border-radius:12px;
  overflow:auto;
}

</style>
</head>

<body>

<div class="wrap">

<div class="card">

<h1>Sistema de Cirurgias</h1>

<div class="grid">

<div>
<label>Horário</label>
<input id="horario_inicio" placeholder="07:30"/>
</div>

<div>
<label>Cirurgia</label>
<input id="nome_cirurgia"/>
</div>

<div>
<label>Duração</label>
<input id="duracao" placeholder="02:00"/>
</div>

<div>
<label>Sala</label>
<input id="sala"/>
</div>

<div>
<label>Serviço</label>
<select id="servico">
<option>SMA</option>
<option>Particular</option>
</select>
</div>

<div>
<label>Anestesista</label>
<input id="anestesista_escalado"/>
</div>

<div>
<label>Iniciais</label>
<input id="iniciais_paciente"/>
</div>

<div>
<label>Idade</label>
<input id="idade_paciente" type="number"/>
</div>

</div>

<div style="margin-top:14px;">
<button onclick="salvar()">
Salvar cirurgia
</button>
</div>

<div
  class="status"
  id="status"
>
Pronto.
</div>

</div>

<div class="card">

<h2>Cirurgias cadastradas</h2>

<div id="lista"></div>

</div>

<div class="card">

<h2>DB Inspector</h2>

<pre id="inspector">
Carregando...
</pre>

</div>

</div>

<script>

async function api(url, options={}) {

  const r = await fetch(url,{
    headers:{
      "Content-Type":"application/json"
    },
    ...options
  });

  const data = await r.json();

  if(!r.ok){
    throw new Error(
      data.error || "Erro"
    );
  }

  return data;

}

function status(msg){
  document
    .getElementById("status")
    .innerText = msg;
}

async function salvar(){

  try{

    const body = {

      horario_inicio:
        document
          .getElementById("horario_inicio")
          .value,

      nome_cirurgia:
        document
          .getElementById("nome_cirurgia")
          .value,

      duracao:
        document
          .getElementById("duracao")
          .value,

      sala:
        document
          .getElementById("sala")
          .value,

      servico:
        document
          .getElementById("servico")
          .value,

      anestesista_escalado:
        document
          .getElementById("anestesista_escalado")
          .value,

      iniciais_paciente:
        document
          .getElementById("iniciais_paciente")
          .value,

      idade_paciente:
        Number(
          document
            .getElementById("idade_paciente")
            .value
        )

    };

    await api("/api/cirurgias",{
      method:"POST",
      body:JSON.stringify(body)
    });

    status("Cirurgia salva.");

    carregar();

  }catch(err){

    status(err.message);

  }

}

async function carregar(){

  try{

    const rows =
      await api("/api/cirurgias");

    document
      .getElementById("lista")
      .innerHTML = `

      <table>

      <thead>

      <tr>
        <th>Hora</th>
        <th>Cirurgia</th>
        <th>Duração</th>
        <th>Sala</th>
        <th>Serviço</th>
        <th>Anestesista</th>
        <th>Paciente</th>
        <th>Idade</th>
      </tr>

      </thead>

      <tbody>

      ${rows.map(r=>`

      <tr>

      <td>${r.horario_inicio}</td>

      <td>${r.nome_cirurgia}</td>

      <td>${r.duracao}</td>

      <td>${r.sala}</td>

      <td>${r.servico}</td>

      <td>${r.anestesista_escalado || ""}</td>

      <td>${r.iniciais_paciente}</td>

      <td>${r.idade_paciente}</td>

      </tr>

      `).join("")}

      </tbody>

      </table>

      `;

    const db =
      await api("/api/db-inspector");

    document
      .getElementById("inspector")
      .innerText =
        JSON.stringify(db,null,2);

  }catch(err){

    status(err.message);

  }

}

carregar();

</script>

</body>
</html>
