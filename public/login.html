<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Login — CC Sama</title>
<style>
:root{--bg:#eef2f7;--card:#fff;--line:#d8e0ee;--text:#172033;--muted:#607086;--blue:#2563eb;--red:#dc2626}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--text);display:flex;align-items:center;justify-content:center;padding:18px}
.card{width:min(430px,100%);background:var(--card);border:1px solid var(--line);border-radius:22px;padding:22px;box-shadow:0 14px 36px #0f172a18}
h1{margin:0 0 6px;font-size:24px}.sub{color:var(--muted);font-size:13px;margin-bottom:18px}
label{font-size:13px;font-weight:800;margin:12px 0 6px;display:block}
input{width:100%;border:1px solid var(--line);border-radius:14px;padding:13px;font:inherit}
button{width:100%;margin-top:16px;border:0;border-radius:14px;background:var(--blue);color:white;font-weight:900;padding:13px;font:inherit}
.status{margin-top:12px;padding:10px;border-radius:12px;font-size:13px;font-weight:800;background:#eff6ff;color:#1e3a8a;white-space:pre-wrap}
.status.err{background:#fee2e2;color:#991b1b}
</style>
</head>
<body>
<div class="card">
  <h1>CC Sama</h1>
  <div class="sub">Acesso ao mapa cirúrgico</div>
  <label>Usuário</label>
  <input id="username" autocomplete="username" value="">
  <label>Senha</label>
  <input id="password" type="password" autocomplete="current-password">
  <button id="btnLogin">Entrar</button>
  <div id="status" class="status">Digite usuário e senha.</div>
</div>

<script>
const $ = id => document.getElementById(id);

async function login(){
  const username = $('username').value.trim();
  const password = $('password').value;
  const st = $('status');
  st.className = 'status';
  st.textContent = 'Entrando...';

  try{
    const r = await fetch('/api/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username,password})
    });
    const data = await r.json();
    if(!r.ok || !data.ok) throw new Error(data.error || 'Falha no login');

    const next = new URLSearchParams(location.search).get('next') || '/index_graf_v6.html';
    location.href = next;
  }catch(e){
    st.className = 'status err';
    st.textContent = e.message;
  }
}

$('btnLogin').onclick = login;
$('password').addEventListener('keydown', e => { if(e.key === 'Enter') login(); });
$('username').addEventListener('keydown', e => { if(e.key === 'Enter') $('password').focus(); });
</script>
</body>
</html>
