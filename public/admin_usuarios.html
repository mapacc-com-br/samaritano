<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Usuários — CC Sama</title>
<style>
:root{--bg:#eef2f7;--card:#fff;--line:#d8e0ee;--text:#172033;--muted:#607086;--blue:#2563eb;--green:#16a34a;--red:#dc2626}
*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--text)}
header{position:sticky;top:0;background:#fffffff2;backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:14px;z-index:10}
h1{font-size:20px;margin:0}.sub{font-size:12px;color:var(--muted);margin-top:3px}
.wrap{max-width:760px;margin:0 auto;padding:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:0 8px 24px #0f172a0d}
h2{font-size:16px;margin:0 0 10px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
label{font-size:13px;font-weight:800;margin:10px 0 6px;display:block}
input,select{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;font:inherit;background:#fff}
button{border:0;border-radius:14px;background:var(--blue);color:white;font-weight:900;padding:12px 14px;font:inherit}
button.green{background:var(--green)}button.red{background:var(--red)}button.light{background:#fff;color:#172033;border:1px solid var(--line)}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px}
.status{margin-top:10px;padding:10px;border-radius:12px;font-size:13px;font-weight:800;background:#eff6ff;color:#1e3a8a;white-space:pre-wrap}
.status.err{background:#fee2e2;color:#991b1b}.status.ok{background:#dcfce7;color:#166534}
.user{display:flex;justify-content:space-between;gap:8px;padding:10px;border:1px solid var(--line);border-radius:14px;background:#f8fafc;margin-top:8px}
small{color:var(--muted)}@media(max-width:520px){.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>Administração — CC Sama</h1>
  <div class="sub">Alterar senha, adicionar usuários e abrir o mapa.</div>
</header>

<div class="wrap">
  <div class="card">
    <h2>Acesso rápido</h2>
    <div class="row">
      <button onclick="location.href='/index_graf_v6.html'">Abrir mapa v6</button>
      <button class="light" onclick="location.href='/login.html'">Login</button>
      <button class="red" id="btnLogout">Sair</button>
    </div>
    <div id="status" class="status">Carregando...</div>
  </div>

  <div class="card">
    <h2>Alterar minha senha</h2>
    <label>Senha atual</label>
    <input id="oldPass" type="password">
    <label>Nova senha</label>
    <input id="newPass" type="password">
    <button class="green" id="btnChange">Alterar senha</button>
  </div>

  <div class="card">
    <h2>Adicionar usuário</h2>
    <div class="grid2">
      <div>
        <label>Usuário</label>
        <input id="newUser">
      </div>
      <div>
        <label>Senha inicial</label>
        <input id="newUserPass" type="password">
      </div>
    </div>
    <label>Tipo</label>
    <select id="newRole">
      <option value="user">Usuário</option>
      <option value="admin">Admin</option>
    </select>
    <button class="green" id="btnAdd">Adicionar usuário</button>
  </div>

  <div class="card">
    <h2>Usuários cadastrados</h2>
    <div id="users"></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
function setStatus(msg, cls=''){ $('status').className='status '+cls; $('status').textContent=msg; }

async function api(url,opt={}){
  const r = await fetch(url,{headers:{'Content-Type':'application/json'},...opt});
  const data = await r.json().catch(()=>({}));
  if(!r.ok || data.ok===false) throw new Error(data.error || ('HTTP '+r.status));
  return data;
}

async function load(){
  try{
    const me = await api('/api/me');
    const users = await api('/api/users');
    setStatus('Logado como: '+me.user.username+' ('+me.user.role+')','ok');
    $('users').innerHTML = users.users.map(u => `
      <div class="user">
        <div><b>${u.username}</b><br><small>${u.role} · criado em ${u.created_at || '-'}</small></div>
      </div>
    `).join('') || '<small>Nenhum usuário.</small>';
  }catch(e){
    setStatus(e.message,'err');
    if(String(e.message).toLowerCase().includes('não autenticado')) location.href='/login.html?next=/admin_usuarios.html';
  }
}

$('btnChange').onclick = async ()=>{
  try{
    await api('/api/change-password',{method:'POST',body:JSON.stringify({oldPassword:$('oldPass').value,newPassword:$('newPass').value})});
    $('oldPass').value=''; $('newPass').value='';
    setStatus('Senha alterada.','ok');
  }catch(e){ setStatus(e.message,'err'); }
};

$('btnAdd').onclick = async ()=>{
  try{
    await api('/api/users',{method:'POST',body:JSON.stringify({username:$('newUser').value,password:$('newUserPass').value,role:$('newRole').value})});
    $('newUser').value=''; $('newUserPass').value='';
    setStatus('Usuário adicionado.','ok');
    await load();
  }catch(e){ setStatus(e.message,'err'); }
};

$('btnLogout').onclick = async ()=>{
  await fetch('/api/logout',{method:'POST'});
  location.href='/login.html';
};

load();
</script>
</body>
</html>
